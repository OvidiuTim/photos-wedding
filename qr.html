<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f2f1" />
    <link rel="icon" href="wedding invite/wed-fonts/Asset 5.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Fotografii · Catalina &amp; Andrei</title>
  </head>
  <body>
    <main class="photo-page">
      <section class="photo-card" aria-labelledby="page-title">
        <img
          class="wedding-mark"
          src="wedding invite/wed-fonts/Asset 5.svg"
          alt=""
          aria-hidden="true"
        />

        <p class="couple-name">Catalina &amp; Andrei</p>
        <img
          class="ornament"
          src="wedding invite/wed-fonts/Asset 17.svg"
          alt=""
          aria-hidden="true"
        />

        <h1 id="page-title">
          Împărtășiți cu noi amintirile surprinse prin ochii voștri
        </h1>
        <p class="intro-text">
          Ajutați-ne să retrăim zâmbetele, dansurile și momentele frumoase ale
          nunții, așa cum le-ați văzut voi.
        </p>

        <div class="qr-frame">
          <img
            class="qr-code"
            src="wedding invite/wed-fonts/qr-code.png"
            alt="Cod QR pentru încărcarea fotografiilor și videoclipurilor"
          />
        </div>
      </section>
    </main>
  </body>
</html>
