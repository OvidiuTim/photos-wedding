<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f2f1" />
    <link rel="icon" href="wedding invite/wed-fonts/Asset 5.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Mulțumim · Catalina &amp; Andrei</title>
  </head>
  <body>
    <main class="photo-page">
      <section class="photo-card success-card" aria-labelledby="page-title">
        <img
          class="wedding-mark"
          src="wedding invite/wed-fonts/Asset 5.svg"
          alt=""
          aria-hidden="true"
        />

        <h1 id="page-title">Mulțumim pentru amintirile împărtășite!</h1>
        <p class="intro-text">
          Fotografiile și videoclipurile voastre au fost încărcate cu succes.<br />
          Abia așteptăm să retrăim zâmbetele, dansurile și momentele frumoase
          ale nunții prin ochii voștri.
        </p>

        <button class="btn btn-incarca" type="button">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 16V4m0 0L7.5 8.5M12 4l4.5 4.5M5 13v5a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-5" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          Adaugă mai multe poze și videoclipuri
        </button>

        <p class="upload-note">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 10V8a5 5 0 0 1 10 0v2m-11 0h12a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-8a1 1 0 0 1 1-1Z" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          Poți încărca oricând mai multe fotografii și videoclipuri deodată.
        </p>
      </section>
    </main>

    <script>
      document.querySelector(".btn-incarca").addEventListener("click", () => {
        window.location.href = "index.html";
      });
    </script>
  </body>
</html>
