<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f2f1" />
    <link rel="icon" href="wedding invite/wed-fonts/Asset 5.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Fotografii · Catalina &amp; Andrei</title>
  </head>
  <body>
    <main class="photo-page">
      <section class="photo-card" aria-labelledby="page-title">
        <img
          class="wedding-mark"
          src="wedding invite/wed-fonts/Asset 5.svg"
          alt=""
          aria-hidden="true"
        />

        <p class="couple-name">Catalina &amp; Andrei</p>
        <img
          class="ornament"
          src="wedding invite/wed-fonts/Asset 17.svg"
          alt=""
          aria-hidden="true"
        />

        <h1 id="page-title">Împărtășește cu noi momentele surprinse de tine</h1>
        <p class="intro-text">
          Vrem să retrăim fiecare zâmbet, fiecare dans și fiecare clipă a nunții
          prin ochii voștri.
        </p>

        <button class="btn btn-incarca" type="button">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 16V4m0 0L7.5 8.5M12 4l4.5 4.5M5 13v5a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-5" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          Încarcă poze
        </button>

        <p class="upload-note">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 10V8a5 5 0 0 1 10 0v2m-11 0h12a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-8a1 1 0 0 1 1-1Z" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          Poți selecta mai multe fotografii și videoclipuri deodată
        </p>
      </section>
    </main>

    <div class="loader" id="loader" role="status" aria-live="polite" aria-hidden="true">
      <div class="loader-card">
        <div class="spinner" aria-hidden="true"></div>
        <p class="loader-title">Păstrăm amintirile...</p>
        <p class="loader-status" id="loader-status">Se încarcă fișierele tale</p>
      </div>
    </div>

    <script>
      const CLOUD_NAME = "dt4t2o3sm";
      const UPLOAD_PRESET = "wedding2026";
      const FOLDER = "wedding/test";

      const button = document.querySelector(".btn-incarca");
      const loader = document.getElementById("loader");
      const loaderStatus = document.getElementById("loader-status");

      const picker = document.createElement("input");
      picker.type = "file";
      picker.multiple = true;
      picker.accept = "image/*,video/*";
      picker.hidden = true;
      document.body.appendChild(picker);

      picker.addEventListener("change", async () => {
        if (!picker.files?.length) return;

        button.disabled = true;
        loader.classList.add("is-visible");
        loader.setAttribute("aria-hidden", "false");

        const files = Array.from(picker.files);

        for (const [index, file] of files.entries()) {
          loaderStatus.textContent = `Se încarcă ${index + 1} din ${files.length}: ${file.name}`;

          const formData = new FormData();
          formData.append("file", file);
          formData.append("upload_preset", UPLOAD_PRESET);
          formData.append("folder", FOLDER);

          try {
            const response = await fetch(
              `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`,
              { method: "POST", body: formData },
            );
            const result = await response.json();

            if (!response.ok || !result.secure_url) {
              console.error(`Încărcarea a eșuat pentru ${file.name}:`, result.error || result);
            }
          } catch (error) {
            console.error(`Eroare de rețea pentru ${file.name}:`, error);
          }
        }

        picker.value = "";
        window.location.href = "thank-you.html";
      });

      button.addEventListener("click", () => picker.click());
    </script>
  </body>
</html>
